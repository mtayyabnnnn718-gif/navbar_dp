<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Navbar</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#1746b2,#1e3a8a,#141adc);
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Logo */
.logo{
font-size:24px;
color:white;
font-weight:bold;
}

.logo span{
color:#38bdf8;
}

/* Nav links */
.nav-links{
list-style:none;
display:flex;
gap:25px;
}

.nav-links li a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
position:relative;
}

.nav-links li a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#38bdf8;
transition:0.3s;
}

.nav-links li a:hover{
color:#38bdf8;
}

.nav-links li a:hover::after{
width:100%;
}

/* Profile DP */
.profile img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid #38bdf8;
object-fit:cover;
}

/* Responsive */
@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
}

.nav-links{
flex-direction:column;
gap:10px;
align-items:center;
}

}
</style>
<body>

<nav class="navbar">

    <div class="logo">
        Navbar<span>Dp</span>
    </div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <div class="profile">
        <img src="bluecortdp.jpg" alt="DP">
    </div>

</nav>

</body>
<script>
    const form = document.querySelector(".application-form");

form.addEventListener("submit", function(e){

    e.preventDefault();

    alert("Application Submitted Successfully!");

    form.reset();

});
</script>
</html>
